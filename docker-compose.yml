services:
  db:
    image: postgres:16
    container_name: assignment-db
    environment:
      POSTGRES_DB: assignment_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d assignment_db"]
      interval: 5s
      timeout: 5s
      retries: 12

  backend:
    build:
      context: ./backend
    container_name: assignment-backend
    environment:
      APP_NAME: Assignment API
      ENVIRONMENT: docker
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/assignment_db
      SECRET_KEY: change-this-before-production
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      LOG_LEVEL: INFO
      LOG_JSON: "true"
      CORS_ORIGINS: http://localhost:5173
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000/api/v1
    container_name: assignment-frontend
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  postgres_data:
